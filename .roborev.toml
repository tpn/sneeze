agent = "codex"
display_name = "sneeze"
review_reasoning = "thorough"
review_agent = "claude-code"
review_backup_agent = "codex"
fix_agent = "codex"
fix_reasoning = "thorough"
refine_agent = "codex"
refine_reasoning = "thorough"
fix_min_severity = "medium"
refine_min_severity = "medium"
post_commit_review = "commit"
reuse_review_session = true
reuse_review_session_lookback = 12

review_guidelines = """
Focus on the current Sneeze diff only.

Prioritize concrete regressions in CLI behavior, run-log durability,
plugin resolution, generated scaffold correctness, packaging, and missing
targeted tests.

Do not request user-specific domain functionality in core Sneeze.
"""

[ci]
agents = ["codex", "claude-code", "gemini"]
synthesis_agent = "claude-code"
review_types = ["default"]
reasoning = "thorough"
min_severity = "medium"
